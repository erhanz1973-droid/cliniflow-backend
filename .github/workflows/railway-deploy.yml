# Railway: requires GitHub repo secrets (Project → Settings → Tokens in Railway dashboard):
#   RAILWAY_TOKEN        — Project token
#   RAILWAY_PROJECT_ID   — Project ID (from dashboard URL or Settings)
# Optional:
#   RAILWAY_ENVIRONMENT  — defaults to production
#   RAILWAY_SERVICE      — service name or ID if the project has multiple services
name: Deploy Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: railway-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Deploy via Railway CLI
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
        run: |
          set -euo pipefail
          if [ -z "${RAILWAY_TOKEN:-}" ] || [ -z "${RAILWAY_PROJECT_ID:-}" ]; then
            echo "Missing RAILWAY_TOKEN or RAILWAY_PROJECT_ID in repo secrets."
            echo "Railway → Project → Settings → Tokens; copy Project ID from the URL or settings."
            exit 1
          fi
          npm i -g @railway/cli@4
          ENV_NAME="${RAILWAY_ENVIRONMENT:-production}"
          if [ -n "${RAILWAY_SERVICE:-}" ]; then
            railway up -d --ci -y \
              -p "$RAILWAY_PROJECT_ID" \
              -e "$ENV_NAME" \
              -s "$RAILWAY_SERVICE"
          else
            railway up -d --ci -y \
              -p "$RAILWAY_PROJECT_ID" \
              -e "$ENV_NAME"
          fi
