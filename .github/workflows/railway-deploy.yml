# Railway: requires one GitHub Actions secret:
#   RAILWAY_TOKEN — Project token (Railway → Project → Settings → Tokens)
# Project/service targeting comes from Railway dashboard linkage (Root Directory, service config).
# No RAILWAY_PROJECT_ID needed when using a project-scoped token.
name: Deploy Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: railway-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init backend submodule
        run: |
          git submodule sync -- cliniflow-backend-clean
          git submodule update --init --depth 1 -- cliniflow-backend-clean

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        working-directory: cliniflow-backend-clean
        run: railway up --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
