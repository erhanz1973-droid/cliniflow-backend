# Monorepo: rootDir `.` = run build/start from repo root. Required so `npm install`
# installs root dependencies (express, @supabase/supabase-js, …) for index.cjs.
# If Render "Root Directory" is set to `cliniflow-backend` only, move it to `.` (repo root).
services:
  - type: web
    name: cliniflow-backend
    runtime: node
    region: oregon
    plan: starter
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
